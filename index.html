<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CTSAC-3 · Unidade 2 — Guia Didático Pós-AS1 (v14)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=IBM+Plex+Mono:wght@400;500&family=IBM+Plex+Serif:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f7f6f3;
  --surface: #ffffff;
  --surface2: #f0efe9;
  --border: #dddbd3;
  --border2: #c8c5bc;
  --text: #1a1917;
  --text-mid: #4a4742;
  --text-dim: #8a8680;

  /* Disciplinas */
  --imuno: #9d174d;
  --imuno-light: #fdf2f8;
  --imuno-mid: #f9a8d4;
  --farma: #b45309;
  --farma-light: #fffbeb;
  --farma-mid: #fcd34d;
  --fisio: #065f46;
  --fisio-light: #ecfdf5;
  --fisio-mid: #6ee7b7;
  --bioquim: #1e40af;
  --bioquim-light: #eff6ff;
  --bioquim-mid: #93c5fd;
  --purple: #6d28d9;
  --purple-bg: #f5f3ff;

  /* Callouts */
  --info: #1d4ed8;
  --info-bg: #eff6ff;
  --warn: #b45309;
  --warn-bg: #fffbeb;
  --danger: #b91c1c;
  --danger-bg: #fef2f2;
  --ok: #15803d;
  --ok-bg: #f0fdf4;

  --r: 8px;
  --r-lg: 12px;
  --sh: 0 1px 3px rgba(0,0,0,.07), 0 1px 2px rgba(0,0,0,.04);
  --sh-md: 0 4px 16px rgba(0,0,0,.08);
}

* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'IBM Plex Sans', system-ui, sans-serif;
  font-size: 15px;
  line-height: 1.75;
  -webkit-font-smoothing: antialiased;
}

/* ESTILOS PARA ADIÇÃO DE IMAGENS E REFERÊNCIAS DIDÁTICAS */
.med-image-container {
  margin: 20px 0;
  padding: 16px;
  background: var(--surface2);
  border-radius: var(--r);
  border: 1px solid var(--border2);
  text-align: center;
}
.med-image-placeholder {
  width: 100%;
  max-width: 620px;
  height: auto;
  border-radius: calc(var(--r) - 2px);
  box-shadow: var(--sh);
  margin-bottom: 10px;
}
.med-image-legend {
  font-size: 13px;
  color: var(--text-mid);
  font-style: italic;
  line-height: 1.4;
}
.med-references {
  margin-top: 25px;
  padding-top: 15px;
  border-top: 1px dashed var(--border2);
  font-size: 12px;
  color: var(--text-dim);
}

/* ── TOPBAR ── */
.topbar {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 24px;
  height: 52px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 400;
  box-shadow: var(--sh);
}
.topbar-left { display: flex; align-items: center; gap: 12px; }
.topbar-logo {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 500;
  color: var(--text-dim);
  letter-spacing: .08em;
  text-transform: uppercase;
}
.topbar-title {
  font-size: 13px;
  font-weight: 600;
  color: var(--text);
}
.topbar-sep { color: var(--border2); font-size: 18px; margin: 0 2px; }
.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  background: var(--surface2);
  border: 1px solid var(--border);
  border-radius: 20px;
  padding: 3px 12px;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 500;
  color: var(--text-mid);
  letter-spacing: .04em;
}
.badge-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--ok); }

/* ── TAB NAV ── */
.tabnav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  padding: 0 24px;
  position: sticky;
  top: 52px;
  z-index: 300;
  overflow-x: auto;
  scrollbar-width: none;
}
.tabnav::-webkit-scrollbar { display: none; }
.tab {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 0 20px;
  height: 44px;
  border: none;
  border-bottom: 2px solid transparent;
  background: none;
  font-family: 'IBM Plex Sans', sans-serif;
  font-size: 13px;
  font-weight: 500;
  color: var(--text-mid);
  cursor: pointer;
  white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.tab:hover { color: var(--text); }
.tab-dot { width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0; }
.tab[data-t="imuno"].active { border-color: var(--imuno); color: var(--imuno); }
.tab[data-t="farma"].active { border-color: var(--farma); color: var(--farma); }
.tab[data-t="fisio"].active { border-color: var(--fisio); color: var(--fisio); }
.tab[data-t="bioquim"].active { border-color: var(--bioquim); color: var(--bioquim); }
.tab[data-t="anat"].active { border-color: var(--purple); color: var(--purple); }

.tab[data-t="imuno"] .tab-dot { background: var(--imuno); }
.tab[data-t="farma"] .tab-dot { background: var(--farma); }
.tab[data-t="fisio"] .tab-dot { background: var(--fisio); }
.tab[data-t="bioquim"] .tab-dot { background: var(--bioquim); }
.tab[data-t="anat"] .tab-dot { background: var(--purple); }

/* ── LAYOUT ── */
.layout {
  display: flex;
  min-height: calc(100vh - 96px);
}

/* Sidebar */
.sidebar {
  width: 260px;
  background: var(--surface);
  border-right: 1px solid var(--border);
  padding: 24px 16px;
  position: sticky;
  top: 96px;
  height: calc(100vh - 96px);
  overflow-y: auto;
  flex-shrink: 0;
}
.sb-section { margin-bottom: 24px; }
.sb-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  color: var(--text-dim);
  letter-spacing: .08em;
  text-transform: uppercase;
  margin-bottom: 8px;
  padding: 0 8px;
}
.sb-links { display: flex; flex-direction: column; gap: 2px; }
.sb-link {
  display: block;
  padding: 6px 12px;
  border-radius: var(--r);
  color: var(--text-mid);
  text-decoration: none;
  font-size: 13.5px;
  cursor: pointer;
  line-height: 1.4;
  transition: background .12s, color .12s;
}
.sb-link:hover { background: var(--surface2); color: var(--text); }
.sb-link.active { font-weight: 500; }

.sidebar[data-active="imuno"] .sb-link.active { background: var(--imuno-light); color: var(--imuno); }
.sidebar[data-active="farma"] .sb-link.active { background: var(--farma-light); color: var(--farma); }
.sidebar[data-active="fisio"] .sb-link.active { background: var(--fisio-light); color: var(--fisio); }
.sidebar[data-active="bioquim"] .sb-link.active { background: var(--bioquim-light); color: var(--bioquim); }
.sidebar[data-active="anat"] .sb-link.active { background: var(--purple-bg); color: var(--purple); }

/* Main content */
.main {
  flex: 1;
  padding: 32px 48px 120px;
  max-width: 840px;
  min-width: 0;
}

/* Panels */
.panel { display: none; }
.panel.active { display: block; }

/* ── TYPOGRAPHY ── */
.p-header { margin-bottom: 32px; }
.p-title { font-size: 24px; font-weight: 700; letter-spacing: -0.02em; margin-bottom: 4px; }
.p-subtitle { color: var(--text-mid); font-size: 14px; }

h3 { font-size: 16px; font-weight: 600; margin: 24px 0 12px; color: var(--text); }
p { margin-bottom: 14px; color: var(--text-mid); }
ul, ol { margin: 0 0 16px 20px; color: var(--text-mid); }
li { margin-bottom: 6px; }
strong { color: var(--text); }

/* ── CALLOUT BOXES ── */
.callout {
  border-radius: var(--r);
  padding: 14px 18px;
  margin: 18px 0;
  font-size: 14px;
  line-height: 1.7;
  border-left: 3px solid;
}
.callout-title {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 10px;
  font-weight: 600;
  letter-spacing: .1em;
  text-transform: uppercase;
  margin-bottom: 8px;
}
.callout.info { background: var(--info-bg); border-color: var(--info); }
.callout.info .callout-title { color: var(--info); }
.callout.warn { background: var(--warn-bg); border-color: var(--warn); }
.callout.warn .callout-title { color: var(--warn); }
.callout.danger { background: var(--danger-bg); border-color: var(--danger); }
.callout.danger .callout-title { color: var(--danger); }
.callout.ok { background: var(--ok-bg); border-color: var(--ok); }
.callout.ok .callout-title { color: var(--ok); }

.callout p:last-child { margin-bottom: 0; }

/* ── PRE-REQUISITOS (ACORDEÃO MINI) ── */
.prereq {
  border: 1px solid var(--border);
  border-radius: var(--r);
  background: var(--surface);
  margin: 14px 0;
  overflow: hidden;
}
.prereq-header {
  padding: 8px 14px;
  background: var(--surface2);
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mid);
  cursor: pointer;
  display: flex;
  justify-content: space-between;
  align-items: center;
  user-select: none;
}
.prereq-body {
  padding: 14px;
  font-size: 13.5px;
  border-top: 1px solid var(--border);
  display: none;
}
.prereq.open .prereq-body { display: block; }
.prereq-header::after { content: '▲'; font-size: 8px; color: var(--text-dim); }
.prereq.open .prereq-header::after { content: '▼'; }

/* ── SECTIONS (ACORDEÕES GRANDES) ── */
.sec-accordion {
  margin-bottom: 16px;
  border-radius: var(--r-lg);
  border: 1px solid var(--border);
  background: var(--surface);
  overflow: hidden;
  box-shadow: var(--sh);
}
.sec-acc-toggle {
  width: 100%;
  padding: 18px 24px;
  background: none;
  border: none;
  cursor: pointer;
  text-align: left;
  display: flex;
  justify-content: space-between;
  align-items: center;
}
.sec-acc-title { font-size: 16px; font-weight: 600; color: var(--text); }
.sec-acc-meta { font-size: 12px; color: var(--text-dim); margin-top: 2px; }
.sec-acc-icon {
  font-size: 12px;
  color: var(--text-dim);
  transition: transform .2s;
}
.sec-acc-body {
  display: none;
  padding: 24px 24px 32px;
  border-top: 1px solid var(--border);
}
.sec-accordion.open .sec-acc-body { display: block; }
.sec-accordion.open .sec-acc-icon { transform: rotate(180deg); }
.sec-accordion.open .sec-acc-toggle { background: var(--surface2); border-bottom: 1px solid var(--border); }

/* ── TABLES ── */
.tbl-wrap {
  overflow-x: auto;
  margin: 18px 0;
  border: 1px solid var(--border);
  border-radius: var(--r);
}
table {
  width: 100%;
  border-collapse: collapse;
  font-size: 13.5px;
  background: var(--surface);
}
th {
  padding: 10px 14px;
  background: var(--surface2);
  text-align: left;
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  font-weight: 600;
  color: var(--text-mid);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
td {
  padding: 12px 14px;
  border-bottom: 1px solid var(--border);
  vertical-align: top;
  line-height: 1.6;
}
tr:last-child td { border-bottom: none; }

/* ── QUIZ COMPONENT ── */
.quiz-container {
  margin-top: 48px;
  border-top: 2px solid var(--border);
  padding-top: 36px;
}
.quiz-section-title {
  font-size: 18px;
  font-weight: 700;
  margin-bottom: 20px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}
.quiz-score-badge {
  font-family: 'IBM Plex Mono', monospace;
  font-size: 11px;
  padding: 2px 10px;
  background: var(--surface2);
  border-radius: 12px;
  color: var(--text-mid);
  display: none;
}
.quiz-score-badge.show { display: inline-block; }

.qblock {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--r-lg);
  padding: 20px;
  margin-bottom: 16px;
  box-shadow: var(--
